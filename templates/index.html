<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PDF Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #4b0082;
            --text-light: #f3f4f6;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #1a0b2e, #000000);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
            background: linear-gradient(to right, #b19cd9, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 300;
            font-size: 0.9rem;
            color: #d1d5db;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="file"]::file-selector-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            margin-right: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: var(--secondary);
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4);
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .result-box {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            animation: fadeIn 0.5s ease-out;
        }

        .result-box h3 {
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #b19cd9;
        }
        
        .result-box p {
            line-height: 1.6;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI PDF Intelligence</h1>
        <p class="subtitle">Upload a document and ask Gemini anything about it.</p>

        <form id="aiForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="document">Upload PDF Document</label>
                <input type="file" id="document" name="document" accept="application/pdf" required>
            </div>

            <div class="form-group">
                <label for="question">What would you like to know?</label>
                <input type="text" id="question" name="question" placeholder="e.g., Summarize the key points of this report..." required>
            </div>

            <button type="submit">Analyze Document</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #a1a1aa;">Gemini is analyzing...</p>
        </div>

        <div class="result-box" id="resultBox">
            <h3>AI Response:</h3>
            <p id="responseText"></p>
        </div>
    </div>

    <script>
        document.getElementById('aiForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            const responseText = document.getElementById('responseText');

            // Show loader, hide previous results
            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                // Get the CSRF token from the hidden input generated by Django
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

                const response = await fetch('/api/chat-pdf/', {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': csrfToken // Required by Django POST requests
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    responseText.textContent = data.answer;
                    resultBox.style.borderLeftColor = 'var(--primary)';
                } else {
                    responseText.textContent = "Error: " + (data.error || "Something went wrong.");
                    resultBox.style.borderLeftColor = '#ff4444'; // Red for errors
                }
            } catch (error) {
                responseText.textContent = "Connection failed. Make sure your server is running.";
                resultBox.style.borderLeftColor = '#ff4444';
            } finally {
                // Hide loader, show results
                loader.style.display = 'none';
                resultBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
